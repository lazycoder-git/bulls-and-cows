services:
  - type: web
    name: bnc-server
    runtime: docker
    dockerfilePath: ./docker/server.Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false          # Set manually in Render dashboard (from Neon)
      - key: DIRECT_URL
        sync: false          # Same as DATABASE_URL for Neon
      - key: REDIS_URL
        sync: false          # Set manually in Render dashboard (from Upstash)
      - key: JWT_SECRET
        sync: false          # Set manually
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false          # Set manually (your Vercel URL)
    healthCheckPath: /health
